name: Revoke Orphan Dev Certificates

on:
  workflow_dispatch:

jobs:
  revoke:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: List and revoke "Created via API" development certificates
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          # Write the API key to a file
          mkdir -p ~/.appstoreconnect
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" > ~/.appstoreconnect/AuthKey.p8

          # Use xcrun to list certificates
          echo "Listing development certificates..."
          xcrun notarytool list-certificates --key-id "$APP_STORE_CONNECT_API_KEY_ID" --issuer-id "$APP_STORE_CONNECT_API_ISSUER_ID" --key ~/.appstoreconnect/AuthKey.p8 || true

          echo "Note: To revoke certificates, visit https://developer.apple.com and log in to your account."
          echo "Then go to: Certificates, Identifiers & Profiles > Certificates > find 'Created via API' certs and revoke them."
