name: Cleanup Orphaned Certificates

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install --break-system-packages requests cryptography

      - name: Cleanup orphaned certificates
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          python3 << 'PYEOF'
          import json
          import time
          import base64
          import requests
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.backends import default_backend

          key_id = "${{ env.APP_STORE_CONNECT_API_KEY_ID }}"
          issuer_id = "${{ env.APP_STORE_CONNECT_API_ISSUER_ID }}"
          key_content = """${{ env.APP_STORE_CONNECT_API_KEY_CONTENT }}"""

          def generate_jwt_token():
              private_key = serialization.load_pem_private_key(
                  key_content.encode(),
                  password=None,
                  backend=default_backend()
              )

              header = {
                  "alg": "ES256",
                  "kid": key_id,
                  "typ": "JWT"
              }

              now = int(time.time())
              payload = {
                  "iss": issuer_id,
                  "aud": "appstoreconnect-v1",
                  "sub": key_id,
                  "iat": now,
                  "exp": now + 1200
              }

              header_b64 = base64.urlsafe_b64encode(json.dumps(header).encode()).rstrip(b'=').decode()
              payload_b64 = base64.urlsafe_b64encode(json.dumps(payload).encode()).rstrip(b'=').decode()
              message = f"{header_b64}.{payload_b64}"

              signature = private_key.sign(
                  message.encode(),
                  ec.ECDSA(hashes.SHA256())
              )

              signature_b64 = base64.urlsafe_b64encode(signature).rstrip(b'=').decode()
              return f"{message}.{signature_b64}"

          token = generate_jwt_token()
          headers = {'Authorization': f'Bearer {token}'}

          url = "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=IOS_DEVELOPMENT"
          response = requests.get(url, headers=headers)

          if response.status_code != 200:
              print(f"Error fetching certs: {response.status_code}")
              print(response.text)
              exit(1)

          certs = response.json().get('data', [])
          print(f"Found {len(certs)} iOS Development certificates\n")

          to_revoke = []
          for cert in certs:
              cert_id = cert['id']
              name = cert['attributes'].get('name', 'Unknown')
              status = cert['attributes'].get('certificateStatus', 'N/A')

              print(f"  ID: {cert_id}")
              print(f"    Name: {name}")
              print(f"    Status: {status}")

              if name == "Created via API":
                  to_revoke.append((cert_id, name))
                  print(f"    -> WILL REVOKE (orphan)")
              print()

          if to_revoke:
              print(f"Revoking {len(to_revoke)} orphaned certificates...")
              for cert_id, name in to_revoke:
                  print(f"  Revoking {cert_id}...", end=" ")
                  resp = requests.delete(
                      f"https://api.appstoreconnect.apple.com/v1/certificates/{cert_id}",
                      headers=headers
                  )
                  if resp.status_code in [200, 204]:
                      print("SUCCESS")
                  else:
                      print(f"FAILED ({resp.status_code}): {resp.text[:100]}")
          else:
              print("No orphaned certificates found.")
          PYEOF
