name: Build Mac Agent DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to publish the DMG under
        required: false
        type: string
  push:
    tags:
      - 'agent-v*'

concurrency:
  group: mac-agent-dmg
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app
          xcodebuild -version

      - name: Install fastlane
        run: gem install fastlane

      - name: Decode Developer ID certificate
        env:
          MAC_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MAC_DEVELOPER_ID_CERTIFICATE_BASE64 }}
        run: |
          mkdir -p certs
          echo "$MAC_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > certs/mac-developer-id.p12

      - name: Build and notarize DMG
        env:
          SIGNING_CERT_PATH: ../certs/mac-developer-id.p12
          SIGNING_CERT_PASSWORD: ${{ secrets.MAC_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          cd fastlane
          fastlane mac release_agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cloude-Agent-dmg
          path: build/release/Cloude-Agent.dmg

      - name: Publish release asset
        if: github.ref_type == 'tag' || github.event.inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          TAG="${RELEASE_TAG:-${GITHUB_REF_NAME}}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "Cloude Agent DMG"
          gh release upload "$TAG" build/release/Cloude-Agent.dmg --clobber

      - name: Cleanup
        if: always()
        run: rm -rf certs/
